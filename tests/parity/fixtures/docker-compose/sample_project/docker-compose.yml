version: "3.9"

services:
  web:
    build: ./app
    ports:
      - "8080:80"
    depends_on:
      - db
      - redis
    environment:
      APP_ENV: production
      SECRET_KEY: changeme

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: mydb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

networks:
  default:
    driver: bridge

volumes:
  db_data:

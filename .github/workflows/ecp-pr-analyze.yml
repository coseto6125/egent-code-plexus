name: ecp PR analyze
on:
  pull_request:
    types: [opened, synchronize, reopened]
  # No `push` trigger: ecp/cross-pr-conflict status is anchored to the
  # PR HEAD commit and computed against merge-base, so a base-branch
  # update doesn't invalidate it. Mergify re-runs its speculative trial
  # natively on base movement.

# Each PR's analysis runs independently; multiple PRs can run in parallel.
# Re-runs on the same PR cancel in-flight (only the latest analysis matters).
concurrency:
  group: ecp-pr-analyze-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  statuses: write
  issues: write  # for PR comment cache writes

# Pin ECP_HOME to a stable workspace-local path so ecp index + ecp dev pr-analyze
# resolve the same graph.bin without glob-search. ecp reads $ECP_HOME via
# resolve_home_ecp() (ecp-core/src/registry/path.rs:78) and graph_path.rs
# resolves the per-commit subdir from HEAD sha automatically — no --graph flag needed.
env:
  ECP_HOME: ${{ github.workspace }}/.ecp-home
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  # GH_REPO pins gh's auto-detection so `gh api repos/{owner}/{repo}/...`
  # resolves reliably inside the runner — autodetect from git remote was
  # observed returning 404 on a fresh PR (PR #381 first smoke).
  GH_REPO: ${{ github.repository }}

jobs:
  analyze:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          # No `ref:` override. The default for pull_request events is
          # refs/pull/N/merge — a synthetic merge commit GitHub computes
          # whose two parents are (^1) PR head and (^2) current base tip.
          # fetch-depth: 0 pulls full history reachable from this merge
          # ref, which is exactly { PR head ancestors ∪ base tip ancestors }.
          # That gives us everything we need locally — no follow-up
          # `git fetch origin <base>` (which triggers the runner's
          # credential-helper flake: "could not read Username … ENXIO").
          #
          # If a PR has merge conflicts, GitHub doesn't compute this ref
          # and checkout fails — that's correct behavior (a conflicting
          # PR can't merge anyway, ecp analysis would be meaningless).

      - name: Compute branch point + switch HEAD to PR head
        id: refs
        run: |
          # Branch point = merge-base of PR head and current base tip,
          # both available as parents of the merge ref's HEAD commit.
          # This is the SAME value `git merge-base origin/<base> <pr-head>`
          # would produce — derived purely from local objects, no network.
          PR_HEAD=$(git rev-parse HEAD^1)
          BASE_TIP=$(git rev-parse HEAD^2)
          BRANCH_POINT=$(git merge-base "$PR_HEAD" "$BASE_TIP")
          echo "pr-head=$PR_HEAD" >> "$GITHUB_OUTPUT"
          echo "branch-point=$BRANCH_POINT" >> "$GITHUB_OUTPUT"
          echo "pr head: $PR_HEAD"
          echo "base tip: $BASE_TIP"
          echo "branch point: $BRANCH_POINT"
          # Detach HEAD onto PR head so subsequent steps (cargo build /
          # ecp index / pr-analyze) see the PR's actual tree, not the
          # synthetic merged tree (which can differ from PR head if any
          # merge resolution applied).
          git checkout "$PR_HEAD"

      - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        id: rust
        with:
          toolchain: stable
          components: ""

      # Layered cache to enable cross-PR dep reuse.
      #
      # Swatinem caches everything under one exact-match key (workspace
      # state + lockfile + rustc) — so any PR with a different Cargo.toml
      # state misses entirely, even though the deps themselves haven't
      # changed. Today's measurement: 9-11 min cold build per fresh PR.
      #
      # actions/cache supports restore-keys (prefix-match fallback) which
      # lets us recover deps from main's cache even when the workspace
      # state differs. cargo's per-crate fingerprint check is the second
      # line of defense: stale .rlib that doesn't match a current crate
      # fingerprint is harmlessly recompiled.
      #
      # Layers + invalidation triggers:
      #   L1 registry → Cargo.lock change (deps version bump)
      #   L2 compiled deps → Cargo.lock change OR rustc bump
      #   workspace artifacts (target/release/{ecp,libecp_*}) → not cached;
      #     they change every PR anyway, caching them just wastes the 10 GB
      #     GHA cache budget that L1+L2 actually benefit from.
      - name: Cache cargo source crates (L1, registry)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
          key: cargo-reg-${{ runner.os }}-${{ steps.rust.outputs.rustc-version }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-reg-${{ runner.os }}-${{ steps.rust.outputs.rustc-version }}-
            cargo-reg-${{ runner.os }}-

      - name: Cache compiled deps (L2, target/release/{deps,build,fingerprint})
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            target/release/.fingerprint
            target/release/build
            target/release/deps
          key: cargo-deps-${{ runner.os }}-${{ steps.rust.outputs.rustc-version }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-deps-${{ runner.os }}-${{ steps.rust.outputs.rustc-version }}-
            cargo-deps-${{ runner.os }}-

      - name: Cache ecp graph index
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ env.ECP_HOME }}
          # Keyed by main HEAD SHA so a fresh PR opened after main moves
          # still finds the freshest viable starting graph (restore-keys
          # gives the fallback chain for partial hits).
          key: ecp-graph-${{ runner.os }}-${{ github.event.pull_request.base.sha }}
          restore-keys: |
            ecp-graph-${{ runner.os }}-

      - name: Build ecp (release)
        run: cargo build -p egent-code-plexus --bin ecp --release

      - name: Index repo
        run: ./target/release/ecp admin index --repo .

      - name: Run pr-analyze
        id: analyze
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          BASE: ${{ steps.refs.outputs.branch-point }}
        run: |
          echo "target: $BASE_REF  baseline (branch point): $BASE"
          ./target/release/ecp \
            dev pr-analyze \
            --baseline "$BASE" \
            --pr-head HEAD \
            --pr-number ${{ github.event.pull_request.number }} \
            --base-branch "$BASE_REF" \
            --format json \
            > /tmp/analysis.json
          cat /tmp/analysis.json

      - name: Apply labels + commit status
        if: steps.analyze.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          # 1) Diff existing ecp:* labels against suggested set; only remove the dropped
          #    and add the new — re-runs with stable classification become no-ops.
          OLD=$(gh pr view "$PR" --json labels --jq '.labels[].name' | grep '^ecp:' | sort || true)
          NEW=$(jq -r '.suggested_labels[]' /tmp/analysis.json | sort)

          # comm -23 = lines only in OLD (to remove); comm -13 = lines only in NEW (to add)
          REMOVE=$(comm -23 <(echo "$OLD") <(echo "$NEW") || true)
          ADD=$(comm -13 <(echo "$OLD") <(echo "$NEW") || true)

          for label in $REMOVE; do
            [ -n "$label" ] && gh pr edit "$PR" --remove-label "$label"
          done
          for label in $ADD; do
            [ -n "$label" ] || continue
            gh label create "$label" --color "ededed" --description "ecp signal" 2>/dev/null || true
            gh pr edit "$PR" --add-label "$label"
          done

          # 2) Push commit status
          CONTEXT=$(jq -r '.suggested_status.context' /tmp/analysis.json)
          STATE=$(jq -r '.suggested_status.state' /tmp/analysis.json)
          DESC=$(jq -r '.suggested_status.description' /tmp/analysis.json)
          gh api -X POST "repos/$REPO/statuses/$HEAD_SHA" \
            -f context="$CONTEXT" -f state="$STATE" -f description="$DESC"

      - name: Log analysis failure (non-blocking)
        if: steps.analyze.outcome != 'success'
        run: |
          echo "::warning::ecp pr-analyze failed — PR falls to default Mergify queue"

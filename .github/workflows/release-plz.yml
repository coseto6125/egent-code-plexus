# Version automation. release-plz reads conventional commits on main and:
#   - release-plz-pr: opens/updates a "Release PR" that bumps
#     [workspace.package].version + internal dep constraints and writes the
#     CHANGELOG. The human merges it — that's the only manual decision.
#   - release-plz-release: on a push that lands the merged Release PR, pushes a
#     single v{version} tag (no publish, no GitHub Release — see release-plz.toml).
#
# The tag push is what hands off to release.yml (v* triggered) for the actual
# 5-platform build + npm/PyPI/crates publish. That handoff REQUIRES a PAT: a tag
# pushed with the default GITHUB_TOKEN is suppressed from triggering other
# workflows (GitHub's anti-recursion rule), so release.yml would never fire.
# AUTO_MERGE_PAT (already used by auto-merge.yml for the same reason) carries the
# write scope; GITHUB_TOKEN stays read-only for a minimal Scorecard surface.

name: Release-plz

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  release-plz-release:
    name: Release-plz release (tag only)
    runs-on: ubuntu-latest
    # Gated like the publish-* jobs: absent by default = no version automation.
    # Set repo Variable RELEASE_PLZ=1 to enable.
    if: vars.RELEASE_PLZ == '1'
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run release-plz release
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}

  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    if: vars.RELEASE_PLZ == '1'
    concurrency:
      group: release-plz-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Run release-plz release-pr
        uses: release-plz/action@064f4d1e36c843611ddf013be726beaa4ad804db # v0.5.129
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}

name: Cache Cleanup

# When a PR closes (merged or not), delete the Actions cache entries
# scoped to its merge ref. Without this, every PR run leaves ~1–3 GB of
# rust-cache + sample-repo cache pinned to refs/pull/<n>/merge until LRU
# eviction kicks in — and the repo's 10 GB quota is small enough that
# evicted entries end up being main's caches instead of dead PR ones.

on:
  pull_request:
    types: [closed]

permissions:
  contents: read
  actions: write   # required to delete cache entries

jobs:
  cleanup:
    name: Delete PR cache entries
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Delete caches scoped to this PR's merge ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BRANCH: refs/pull/${{ github.event.pull_request.number }}/merge
        run: |
          set -euo pipefail
          gh extension install actions/gh-actions-cache

          echo "Listing caches for $BRANCH ..."
          keys=$(gh actions-cache list -R "$REPO" -B "$BRANCH" --limit 100 | cut -f1 || true)
          if [ -z "$keys" ]; then
            echo "No caches to delete."
            exit 0
          fi

          # set +e: deletion is best-effort; a single missing key shouldn't
          # fail the cleanup of the rest.
          set +e
          while IFS= read -r key; do
            [ -z "$key" ] && continue
            echo "Deleting $key"
            gh actions-cache delete "$key" -R "$REPO" -B "$BRANCH" --confirm
          done <<< "$keys"
          echo "Done."

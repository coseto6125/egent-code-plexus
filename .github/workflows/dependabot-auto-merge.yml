name: Dependabot auto-merge

# Auto-merges Dependabot PRs that touch patch + minor bumps once branch
# protection's required status checks are all green. Major bumps still
# require manual review.
#
# Uses `pull_request_target` so the workflow runs in the base repo's
# context and has write permission to merge — `pull_request` from a
# Dependabot fork wouldn't.
#
# Requires the repo to have `allow_auto_merge: true` (set via
# repo settings). Branch protection's "Require status checks to pass"
# guards against merging red PRs even if this workflow fires.

on:
  pull_request_target:

# GITHUB_TOKEN under `pull_request_target` from a Dependabot-authored
# event is minted with reduced scope regardless of what `permissions:`
# declares (GitHub safety against malicious deps). The
# `enablePullRequestAutoMerge` GraphQL mutation fails with "Resource
# not accessible by integration" as a result. AUTO_MERGE_PAT bypasses
# this restriction; GITHUB_TOKEN stays read-only for `fetch-metadata`.
permissions:
  contents: read

jobs:
  dependabot:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@25dd0e34f4fe68f24cc83900b1fe3fe149efef98 # v3.1.0
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          # auto-update-pr-branches.yml uses GraphQL REBASE under PAT,
          # which rewrites the committer and invalidates Dependabot's
          # original GPG signature. Without this flag, every post-rebase
          # sync event fails at "PR is not from Dependabot". The author
          # filter (`if: user.login == 'dependabot[bot]'` at job level)
          # still guarantees only Dependabot-authored PRs reach this step.
          skip-commit-verification: true

      - name: Enable auto-merge for patch + minor
        if: |
          steps.metadata.outputs.update-type == 'version-update:semver-patch'
          || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.AUTO_MERGE_PAT }}

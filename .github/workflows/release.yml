name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (build only, no publish/release)'
        required: false
        default: 'false'

permissions:
  contents: read

# 同一 tag/手動觸發避免重複跑，但不取消已 publish 中的（保證 release atomicity）
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10
  # Homebrew tap lives in a separate repo (not auto-derivable from
  # github.repository). Centralized here so the publish/notes/clone steps
  # below all reference one source of truth — change the tap location
  # without grepping the file.
  HOMEBREW_TAP_REPO: coseto6125/homebrew-tap
  BIN_NAME: ecp
  ECP_BUILD_VERBOSE: 1

jobs:
  # ==================== Multi-platform binary builds ====================
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write       # SLSA OIDC token
      attestations: write   # actions/attest-build-provenance
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            archive: tar.gz
          - target: x86_64-apple-darwin
            os: macos-15
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-2025
            archive: zip

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        # Swatinem with cache-targets: false preserves the original intent
        # (cache deps download, never cache target/ — LTO fat link must
        # always rerun on workspace crates, see Build step note below).
        # shared-key per cross-build target so x86_64-windows and
        # aarch64-darwin don't trample each other's registry layout.
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: release-${{ matrix.target }}
          cache-targets: false
          cache-on-failure: true

      - name: Build release binary
        # target/ is intentionally NOT cached so LTO fat link always runs on
        # workspace crates. Only ~/.cargo/registry is cached (deps download).
        run: cargo build --profile release-dist --bin ${{ env.BIN_NAME }} --target ${{ matrix.target }}

      - name: Package (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          name="${BIN_NAME}-${GITHUB_REF_NAME:-dev}-${{ matrix.target }}"
          mkdir -p "dist/${name}"
          cp "target/${{ matrix.target }}/release-dist/${BIN_NAME}" "dist/${name}/"
          cp README.md LICENSE.md LICENSES/NOTICES.md "dist/${name}/" 2>/dev/null || true
          tar -C dist -czf "dist/${name}.tar.gz" "${name}"
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )


      - name: Package (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "${env:BIN_NAME}-${env:GITHUB_REF_NAME}-${{ matrix.target }}"
          if (-not $env:GITHUB_REF_NAME) { $name = "${env:BIN_NAME}-dev-${{ matrix.target }}" }
          New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release-dist/${env:BIN_NAME}.exe" "dist/$name/"
          foreach ($f in @('README.md','LICENSE.md','LICENSES/NOTICES.md')) {
            if (Test-Path $f) { Copy-Item $f "dist/$name/" }
          }
          Compress-Archive -Path "dist/$name" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip" | Out-File -Encoding ASCII "dist/$name.zip.sha256"

      - name: Generate SLSA build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'dist/*.${{ matrix.archive }}'

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ env.BIN_NAME }}-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
          if-no-files-found: error

  # ==================== GitHub Release ====================
  github-release:
    name: GitHub Release
    needs: [build]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
    permissions:
      contents: write       # GitHub Release 上傳
      id-token: write       # cosign keyless signing

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout (for install scripts)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Stage install scripts into dist
        run: |
          version="${GITHUB_REF_NAME#v}"
          sed "s/ECP_VERSION=\"\${ECP_VERSION:-latest}\"/ECP_VERSION=\"\${ECP_VERSION:-$version}\"/" install.sh > dist/install.sh
          sed "s/\$version = if (\$env:ECP_VERSION) { \$env:ECP_VERSION } else { 'latest' }/\$version = if (\$env:ECP_VERSION) { \$env:ECP_VERSION } else { '$version' }/" install.ps1 > dist/install.ps1
          ls -la dist/

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # cosign v3 made --bundle required and deprecated --output-signature /
      # --output-certificate. We write a single Sigstore bundle per asset
      # using the `.sigstore.json` suffix that OpenSSF Scorecard's
      # releasesAreSigned probe recognises (.asc/.minisig/.sig/.sign/
      # .sigstore/.sigstore.json).
      - name: Sign release assets
        shell: bash
        run: |
          find dist -maxdepth 1 -type f \
            ! -name '*.sigstore.json' \
            -print0 |
            while IFS= read -r -d '' asset; do
              cosign sign-blob --yes \
                --bundle "${asset}.sigstore.json" \
                "${asset}"
            done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/*.sha256
            dist/*.sigstore.json
            dist/install.sh
            dist/install.ps1
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## Install

            ### macOS Homebrew
            ```
            brew tap coseto6125/tap
            brew install egent-code-plexus
            ```

            ### One-shot installer scripts (Linux / macOS)
            ```
            curl -sSfL https://github.com/coseto6125/egent-code-plexus/releases/download/${{ github.ref_name }}/install.sh | sh
            ```

            ### One-shot installer (Windows PowerShell)
            ```
            irm https://github.com/coseto6125/egent-code-plexus/releases/download/${{ github.ref_name }}/install.ps1 | iex
            ```

            ### From git tag (source build)
            ```
            cargo install --git https://github.com/coseto6125/egent-code-plexus --tag ${{ github.ref_name }} --bin ecp
            ```

            ### Manual download
            Pick a `.tar.gz` / `.zip` matching your platform from Assets below.
            Each has a `.sha256` for integrity and a `.sigstore.json`
            Sigstore bundle for keyless signature verification:
            ```
            cosign verify-blob \
              --bundle <asset>.sigstore.json \
              --certificate-identity-regexp 'https://github.com/coseto6125/egent-code-plexus/' \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              <asset>
            ```
            Verify build provenance with:
            ```
            gh attestation verify ./ecp --owner coseto6125
            ```

  # ==================== Post-Release Install Smoke ====================
  # 對剛 publish 的 release assets 跑 user-facing 安裝路徑：
  #   1. install.sh on Linux / macOS
  #   2. install.ps1 on Windows
  # 用 `${{ github.repository }}` + `${{ github.ref_name }}` 直打剛建好的 tag,
  # 避開 `releases/latest` 的 redirect race。安裝完 assert `ecp --version` 含 tag。
  post-release-install-smoke:
    name: Install smoke (${{ matrix.os }})
    needs: [github-release]
    if: startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
          - os: macos-latest
            shell: bash
          - os: windows-latest
            shell: pwsh

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: install.sh smoke (Linux / macOS)
        if: matrix.shell == 'bash'
        shell: bash
        run: |
          set -euo pipefail
          url="https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install.sh"
          curl -sSfL "$url" | sh
          export PATH="$HOME/.local/bin:$PATH"
          want="${GITHUB_REF_NAME#v}"
          ecp --version | tee /dev/stderr | grep -qF "$want" \
            || { echo "::error::ecp --version did not contain $want"; exit 1; }

      - name: install.ps1 smoke (Windows)
        if: matrix.shell == 'pwsh'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/install.ps1"
          iwr $url -UseBasicParsing | iex
          $env:Path = "$env:LOCALAPPDATA\Programs\ecp;$env:Path"
          $want = $env:GITHUB_REF_NAME.TrimStart('v')
          $out  = & ecp --version
          Write-Host $out
          if ($out -notmatch [regex]::Escape($want)) {
            Write-Error "ecp --version did not contain $want"
            exit 1
          }

  # ==================== Cargo install --git smoke ====================
  # 驗證 README / migration guide 上的「explicit cargo path」一行指令：
  #   cargo install --git <repo> egent-code-plexus --tag <tag> --bin ecp --locked
  # 抓 workspace 套件名 / bin 名 / Cargo.lock 漂移問題。
  post-release-cargo-smoke:
    name: cargo install --git smoke
    needs: [github-release]
    if: startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: cargo install --git --tag --locked
        shell: bash
        run: |
          set -euo pipefail
          cargo install \
            --git "https://github.com/${{ github.repository }}" egent-code-plexus \
            --tag "${{ github.ref_name }}" \
            --bin ecp \
            --locked
          want="${GITHUB_REF_NAME#v}"
          ecp --version | tee /dev/stderr | grep -qF "$want" \
            || { echo "::error::ecp --version did not contain $want"; exit 1; }

  # ==================== Homebrew Tap ====================
  # Requires:
  #   1. GitHub repo: coseto6125/homebrew-tap (public)
  #   2. GitHub App installed on both this repo and the tap repo, with
  #      "Contents: Read and write" permission on the tap repo.
  #   3. Variable HOMEBREW_TAP_APP_ID  (the App's numeric ID — not sensitive)
  #   4. Secret  HOMEBREW_TAP_APP_PRIVATE_KEY (the .pem contents)
  # Both not set ⇒ job skips with a notice. App tokens are minted per-run by
  # `actions/create-github-app-token` and auto-expire in ~1h — no long-lived
  # PAT to rotate.
  homebrew-tap:
    name: Update Homebrew tap
    needs: [github-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Decide whether tap is configured
        id: gate
        shell: bash
        run: |
          if [ -z "${{ vars.HOMEBREW_TAP_APP_ID }}" ]; then
            echo "::notice::HOMEBREW_TAP_APP_ID variable is not set; skipping Homebrew tap update."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Mint GitHub App installation token (tap repo, ~1h lifetime)
        if: steps.gate.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          app-id: ${{ vars.HOMEBREW_TAP_APP_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: homebrew-tap

      - name: Generate Homebrew formula
        if: steps.gate.outputs.skip != 'true'
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          arm_sha_file="dist/ecp-${GITHUB_REF_NAME}-aarch64-apple-darwin.tar.gz.sha256"
          x86_sha_file="dist/ecp-${GITHUB_REF_NAME}-x86_64-apple-darwin.tar.gz.sha256"

          if [ ! -f "$arm_sha_file" ] || [ ! -f "$x86_sha_file" ]; then
            echo "::error::Missing macOS sha256 files in dist/."
            ls -la dist
            exit 1
          fi

          arm_sha="$(awk '{print $1}' "$arm_sha_file")"
          x86_sha="$(awk '{print $1}' "$x86_sha_file")"

          mkdir -p generated/Formula
          sed \
            -e "s/@VERSION@/${version}/g" \
            -e "s/@SHA256_ARM64_DARWIN@/${arm_sha}/g" \
            -e "s/@SHA256_X86_64_DARWIN@/${x86_sha}/g" \
            packaging/egent-code-plexus.rb.template \
            > generated/Formula/egent-code-plexus.rb

      - name: Push formula to tap
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_APP_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          git clone "https://x-access-token:${GH_APP_TOKEN}@github.com/${HOMEBREW_TAP_REPO}.git" tap
          mkdir -p tap/Formula
          cp generated/Formula/egent-code-plexus.rb tap/Formula/egent-code-plexus.rb

          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Formula/egent-code-plexus.rb

          # `git diff --quiet -- <path>` returns 0 on an untracked file (no tracked
          # diff), so the first-ever push would silently exit without committing.
          # Compare against HEAD via the staged index instead — covers both new
          # file and content change.
          if git diff --cached --quiet -- Formula/egent-code-plexus.rb; then
            echo "Homebrew formula is already up to date."
            exit 0
          fi

          git commit -m "egent-code-plexus ${GITHUB_REF_NAME}"
          git push

  # ==================== Post-Release brew install smoke ====================
  # End-to-end install smoke for the brew path: tap the published formula
  # and run `brew install` on a fresh macos-latest runner. Catches:
  #   - Formula class-name / filename mismatch (Homebrew validates)
  #   - Wrong sha256 / broken release-asset URL
  #   - `bin.install "ecp"` missing the binary after tarball extract
  # Skipped when tap is not configured (see `homebrew-tap` job above).
  post-release-brew-install-smoke:
    name: brew install smoke (macOS)
    needs: [homebrew-tap]
    runs-on: macos-latest
    if: vars.HOMEBREW_TAP_APP_ID != '' && startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: brew tap + install + verify
        shell: bash
        run: |
          set -euo pipefail
          brew tap coseto6125/tap
          brew install egent-code-plexus
          want="${GITHUB_REF_NAME#v}"
          ecp --version | tee /dev/stderr | grep -qF "$want" \
            || { echo "::error::ecp --version did not contain $want"; exit 1; }

  # ==================== Publish to crates.io ====================
  # 狀態：
  #   ecp-core ── publish-ready (cargo publish --dry-run 通過)
  #   ecp-analyzer ── 阻塞於 git/vendor deps 沒 version：
  #     - tree-sitter-crystal (git dep) 需給 version 或改 crates.io 版
  #     - tree-sitter-kotlin (git dep) 同上
  #     - tree-sitter-move / tree-sitter-swift (vendored path dep) 需先發到
  #       crates.io 或標 publish = false 在 vendor side
  #   egent-code-plexus ── 需 ecp-core + ecp-analyzer 先 publish
  # Token 設定：repo Settings → Secrets → CARGO_REGISTRY_TOKEN
  # 解掉上述阻塞後，到 repo Settings → Variables → Actions
  # 新增 `PUBLISH_CRATES = 1` 即可啟用。預設不存在 = 跳過 publish。
  # 不用 `if: false`，因為 actionlint 會把 constant condition 標為錯誤。
  publish-crates:
    name: Publish to crates.io
    needs: [build]
    runs-on: ubuntu-latest
    if: vars.PUBLISH_CRATES == '1' && startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: publish-${{ hashFiles('Cargo.lock') }}
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Publish ecp-core
        run: cargo publish -p ecp-core --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish ecp-analyzer
        run: cargo publish -p ecp-analyzer --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish egent-code-plexus (cli)
        run: cargo publish -p egent-code-plexus --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ==================== Publish to npm (npx egent-code-plexus) ====================
  # Platform-package model (esbuild/biome): one binary-less main package +
  # five @egent-code-plexus/<platform> packages each carrying one prebuilt
  # binary. No postinstall network fetch — npm picks the platform package via
  # os/cpu, --ignore-scripts stays safe.
  # Enable: repo Settings → Variables → Actions → `PUBLISH_NPM = 1`,
  # and Secrets → `NPM_TOKEN` (automation token with publish rights to the
  # `@egent-code-plexus` scope + the unscoped `egent-code-plexus` name).
  publish-npm:
    name: Publish to npm
    needs: [github-release]
    runs-on: ubuntu-latest
    if: vars.PUBLISH_NPM == '1' && startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
    permissions:
      contents: read
      # npm provenance attestation (mirrors the SLSA posture of the binaries).
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Upgrade npm for trusted publishing (OIDC)
        # Trusted publishing (token-free OIDC) needs npm >= 11.5.1; Node 22 ships
        # npm 10. Without this, publish falls back to NODE_AUTH_TOKEN.
        run: npm install -g npm@latest

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Extract tarballs into per-target dirs
        shell: bash
        run: |
          mkdir -p artifacts
          for f in "dist/ecp-${GITHUB_REF_NAME}"-*.tar.gz; do
            tar -C artifacts -xzf "$f"
          done
          # Windows ships a .zip, not a .tar.gz.
          unzip -o "dist/ecp-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.zip" -d artifacts

      - name: Assemble platform packages
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Stage OUTSIDE the repo checkout: when npm publish --provenance runs
          # from a directory inside a git repo, it treats the staging dir as a
          # monorepo package and tries `git ls-remote` on a path-derived slug
          # (npm-staging/<pkg>) over ssh, which fails (no deploy key). Outside
          # the checkout there is no enclosing .git, so provenance is sourced
          # purely from the GitHub Actions OIDC env (GITHUB_REPOSITORY etc.).
          node packaging/npm/build-platform-packages.mjs \
            --version "$version" --artifacts artifacts --out "$RUNNER_TEMP/npm-staging"

      - name: Publish platform packages, then main package
        shell: bash
        # No NODE_AUTH_TOKEN: authentication is via trusted publishing (OIDC),
        # configured per-package on npmjs.com against this repo + release.yml.
        # id-token: write (above) lets npm mint the OIDC token.
        run: |
          # Publish one package, tolerating "already published this version" so a
          # re-run after a partial failure is idempotent (npm has no
          # --skip-existing). Any other failure still aborts the release.
          publish() {
            local dir="$1" out
            if out=$(npm publish "$dir" --access public --provenance 2>&1); then
              echo "$out"
              return 0
            fi
            echo "$out"
            if echo "$out" | grep -qiE "cannot publish over|previously published|already exists|EPUBLISHCONFLICT|403.*forbidden.*you cannot publish over"; then
              echo "::notice::$(basename "$dir") already published at this version — skipping"
              return 0
            fi
            return 1
          }

          # Platform packages first — the main package's optionalDependencies
          # pin these exact versions, so they must already exist on the registry
          # when the main package is published. Main goes last.
          for d in "$RUNNER_TEMP"/npm-staging/*/; do
            [ "$(basename "$d")" = "egent-code-plexus" ] && continue
            publish "$d"
          done
          publish "$RUNNER_TEMP/npm-staging/egent-code-plexus"

  # ==================== Publish to PyPI (uvx egent-code-plexus) ====================
  # Per-platform wheels built from the same prebuilt binaries (no Rust rebuild).
  # Uses PyPI Trusted Publishing (OIDC) — no token stored. Configure the trusted
  # publisher on PyPI for this repo + workflow, then set
  # repo Settings → Variables → Actions → `PUBLISH_PYPI = 1`.
  publish-pypi:
    name: Publish to PyPI
    needs: [github-release]
    runs-on: ubuntu-latest
    if: vars.PUBLISH_PYPI == '1' && startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
    permissions:
      contents: read
      # OIDC token for PyPI Trusted Publishing.
      id-token: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v6.3.1

      - name: Download release artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true

      - name: Extract tarballs into per-target dirs
        shell: bash
        run: |
          mkdir -p artifacts
          for f in "dist/ecp-${GITHUB_REF_NAME}"-*.tar.gz; do
            tar -C artifacts -xzf "$f"
          done
          unzip -o "dist/ecp-${GITHUB_REF_NAME}-x86_64-pc-windows-msvc.zip" -d artifacts

      - name: Build platform wheels
        working-directory: packaging/pypi
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          uv run --no-project --with build --with wheel python build_wheels.py \
            --version "$version" \
            --artifacts "${GITHUB_WORKSPACE}/artifacts" \
            --out "${GITHUB_WORKSPACE}/wheelhouse"

      - name: Publish to PyPI (Trusted Publishing)
        run: uv publish wheelhouse/*.whl

  # ==================== Update landing-page version badge ====================
  # The landing page lives on the orphan gh-pages branch (GitHub Pages serves it
  # directly). Its hero-version <span> used to be bumped by a manual push on
  # every release. This job replaces that manual step: after the release exists,
  # rewrite the badge to the tag version and push back to gh-pages.
  #
  # PAT (not GITHUB_TOKEN) so the gh-pages push is attributed to a real actor —
  # GITHUB_TOKEN pushes here would be fine functionally, but the repo already
  # standardizes on AUTO_MERGE_PAT for write pushes (keeps GITHUB_TOKEN minimal).
  update-pages-version:
    name: Update gh-pages version badge
    needs: [github-release]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') && (github.event_name != 'workflow_dispatch' || inputs.dry_run != 'true')
    permissions:
      contents: read

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout gh-pages
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: gh-pages
          token: ${{ secrets.AUTO_MERGE_PAT }}

      - name: Bump hero-version badge to ${{ github.ref_name }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          # Match only the hero-version span so the benchmark caption versions
          # (ecp 0.4.2 · codegraph … — those are fixed test-run records) are left
          # untouched. The vN.N.N is replaced wholesale, not pattern-stripped.
          sed -i -E "s#(<span class=\"hero-version\">)v[0-9]+\.[0-9]+\.[0-9]+(</span>)#\1${tag}\2#" index.html

          if git diff --quiet -- index.html; then
            echo "hero-version already at ${tag}; nothing to push."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "docs(gh-pages): bump hero-version to ${tag}"
          git push

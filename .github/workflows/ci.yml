name: CI

# CI strategy: docs-only PRs short-circuit heavy jobs (cargo build / test /
# audit) at the STEP level — the job itself still runs and reports SUCCESS,
# satisfying branch protection's required-check list while not burning CI
# minutes on .md edits.
#
# History: paths-ignore at the workflow level made required-check jobs
# never report, deadlocking docs-only PRs (#236/#278). The current
# `detect-changes` setup avoids that trap because:
#   1. Every required-check job continues to RUN (no job-level `if: false`).
#   2. The first step in each heavy job inspects `needs.detect-changes`
#      output and either short-circuits with a SUCCESS message (docs-only)
#      or proceeds with real work (code change).
#   3. actionlint runs unconditionally — it lints workflow YAML which is
#      always present, fast, and idempotent.
#
# Code-path detection lives in the `detect-changes` job (shell-based diff
# against `github.base_ref`) — no third-party action, transparent regex.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Merge queue: GitHub builds a temporary `gh-readonly-queue/main/...` branch
  # combining PRs + main, and runs CI on that combined state. Without this
  # trigger, the queue would hang waiting for required-checks to report.
  merge_group:

permissions:
  contents: read

# 同一 ref 連續推送時，取消還在跑的舊 run，省額度。
# main 分支不取消（保留完整 history）。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  # Swatinem 建議：CI 關掉 incremental compile，cold cache 更快、target/ cache 更小。
  CARGO_INCREMENTAL: 0
  # 縮短 panic 處理時間 + 不展開 macro 反向追蹤，build 略快。
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  # ==================== Detect code changes ====================
  # Outputs `code: true|false` based on whether any code-relevant path
  # changed in this PR. Heavy downstream jobs gate their real work on this
  # output but still RUN as jobs (SUCCESS on docs-only, full work on code).
  #
  # On push-to-main events `code` is unconditionally true (merge commits
  # always get full validation regardless of detected paths).
  detect-changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need history to diff PR head against base ref.
          fetch-depth: 0
          persist-credentials: false

      - name: Classify changed paths
        id: filter
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          # Push to main: always treat as code change (final validation).
          if [[ "$EVENT_NAME" != "pull_request" ]]; then
            echo "Event is '$EVENT_NAME' (not pull_request) — defaulting code=true"
            echo "code=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git fetch --no-tags --depth=1 origin "$BASE_REF"
          CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          echo "Changed files:"
          while IFS= read -r file; do echo "  $file"; done <<< "$CHANGED"

          # Positive list — anything outside it is docs/config/license-only.
          # Match anchors: ^ start, $ end for exact-filename matches.
          if echo "$CHANGED" | grep -qE '^(crates/|Cargo\.toml$|Cargo\.lock$|\.github/|scripts/|rust-toolchain|deny\.toml$|clippy\.toml$|rustfmt\.toml$)'; then
            echo "Code-relevant change detected — code=true"
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "No code-relevant change — code=false (docs-only)"
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # ==================== Code Quality ====================
  code-quality:
    name: Code Quality (Linting & Formatting)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Short-circuit for docs-only PR
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "✓ Docs-only PR — skipping rustfmt + clippy"

      - name: Harden the runner (Audit all outbound calls)
        if: needs.detect-changes.outputs.code == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        if: needs.detect-changes.outputs.code == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        if: needs.detect-changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        if: needs.detect-changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: linux-build   # 與 test-ubuntu 共用 target/，避免互相覆蓋
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Run rustfmt check
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::Rustfmt"
          cargo fmt --all -- --check
          echo "::endgroup::"

      - name: Run clippy
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::Clippy"
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          echo "::endgroup::"

  # ==================== Cross-Platform Tests (nextest, sharded) ====================
  # Sharding: ~3177 tests split into 4 partitions per platform via
  # `cargo nextest --partition count:N/4`. All 4 shards on a given OS
  # compile the same target/ (only test selection differs at runtime),
  # so the Swatinem rust-cache `shared-key` is identical across shards
  # — first finisher saves, others no-op (GHA cache "exists, skip"
  # semantics). Wall-clock per platform: ~7m → ~2m45s.
  #
  # Aggregated status is exposed via the `test-result` job below as a
  # single required check ("Test (all platforms)") — branch protection
  # cares about that one name, not the 8 individual shard jobs.
  test:
    name: Test on ${{ matrix.os }} (shard ${{ matrix.shard }}/4)
    runs-on: ${{ matrix.os }}
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        # Windows moved to nightly (.github/workflows/ci-windows-nightly.yml):
        # the windows-latest runner has a known partner-runner-images bash
        # startup race (#169) that flakes ~5% of PR runs, and Rust CLI code
        # here is platform-agnostic (uses `dirs` / `PathBuf` everywhere).
        # Windows still validates on schedule + push-to-main + workflow_dispatch.
        os: [ubuntu-latest, macos-latest]
        shard: [1, 2, 3, 4]
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}
    env:
      # 14 tree-sitter parsers × 30+ test binaries × debug-info defaulted to
      # `true` produced ~30 GB in target/debug/deps/ and filled the ubuntu
      # runner's 14 GB free space at link time (tantivy.rlib → os error 28).
      # Tests run under nextest don't need debug-info; assertions stay on.
      CARGO_PROFILE_TEST_DEBUG: "0"

    steps:
      - name: Short-circuit for docs-only PR
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "✓ Docs-only PR — skipping cargo nextest on ${{ matrix.os }} shard ${{ matrix.shard }}/4"

      - name: Harden the runner (Audit all outbound calls)
        if: needs.detect-changes.outputs.code == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Reclaim ~30 GB on ubuntu runners before checkout / build. macOS &
      # windows have 50+ GB free by default; only ubuntu needs this.
      - name: Free disk space (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout code
        if: needs.detect-changes.outputs.code == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        if: needs.detect-changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-nextest
        if: needs.detect-changes.outputs.code == 'true'
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-nextest

      # Sample repos are 13 shallow clones (~1.8 GB) used as parity fixtures.
      # Key tracks the bootstrap script; cache shared across OSes since content
      # is pure git data. Hit lets the script's `.git`-presence check no-op.
      - name: Cache sample repos
        if: needs.detect-changes.outputs.code == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .sample_repo
          key: sample-repos-${{ hashFiles('scripts/parity/bootstrap_sample_repos.sh') }}

      - name: Bootstrap sample repos
        if: needs.detect-changes.outputs.code == 'true'
        shell: bash
        run: bash scripts/parity/bootstrap_sample_repos.sh

      - name: Cache cargo
        if: needs.detect-changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # ubuntu 與 code-quality 共用 cache，macos/windows 獨立
          shared-key: ${{ matrix.os == 'ubuntu-latest' && 'linux-build' || matrix.os }}
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Run tests (nextest, sharded)
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::cargo nextest (shard ${{ matrix.shard }}/4)"
          cargo nextest run --workspace --all-features --no-fail-fast \
            --partition count:${{ matrix.shard }}/4
          echo "::endgroup::"

  # ==================== Test aggregator (required-check facade) ====================
  # Collapses the 8 sharded `test` jobs (2 OS × 4 shards) into a single
  # named check. Branch protection requires this one name instead of
  # listing all 8 shard contexts — keeps required-checks list stable
  # if shard count changes later.
  #
  # `if: always()` ensures this job runs even when shards fail, so the
  # facade reports the real aggregate (rather than going "queued forever"
  # and timing out the merge). The exit-1 short-circuit converts any
  # non-success result from a shard into an overall failure here.
  test-result:
    name: Test (all platforms)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() && !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}
    steps:
      - name: Aggregate shard results
        env:
          TEST_RESULT: ${{ needs.test.result }}
        run: |
          echo "test job aggregate result: $TEST_RESULT"
          if [ "$TEST_RESULT" = "success" ] || [ "$TEST_RESULT" = "skipped" ]; then
            exit 0
          fi
          echo "::error::At least one test shard failed or was cancelled"
          exit 1

  # ==================== Supply-chain Audit ====================
  audit:
    name: Supply-chain (audit & deny)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Short-circuit for docs-only PR
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "✓ Docs-only PR — skipping cargo-audit + cargo-deny (no Cargo.lock change)"

      - name: Harden the runner (Audit all outbound calls)
        if: needs.detect-changes.outputs.code == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        if: needs.detect-changes.outputs.code == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain (audit 需要 cargo metadata 來解 Cargo.lock)
        if: needs.detect-changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry & advisory-db
        if: needs.detect-changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Swatinem v2.9 already folds Cargo.lock hash into the final key
          # suffix (-<lockfile-hash>); wrapping the shared-key in hashFiles()
          # too forces a 100% miss on every lockfile change. Plain `audit`
          # lets the built-in lockfile-derived suffix handle invalidation.
          shared-key: audit
          # audit/deny 只讀 lockfile，不需快取 target/
          cache-targets: false
          cache-on-failure: true

      - name: Install cargo-audit & cargo-deny
        if: needs.detect-changes.outputs.code == 'true'
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-audit,cargo-deny

      - name: Run cargo-audit
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::cargo audit"
          cargo audit
          echo "::endgroup::"

      - name: Run cargo-deny
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::cargo deny"
          cargo deny check
          echo "::endgroup::"

  # ==================== Workflow Lint ====================
  # actionlint runs unconditionally — fast (~30s), idempotent, and lints
  # the workflow YAML itself which is always present. No short-circuit.
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error

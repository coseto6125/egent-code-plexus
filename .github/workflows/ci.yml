name: CI

# CI strategy: docs-only PRs short-circuit heavy jobs (cargo build / test /
# audit) at the STEP level — the job itself still runs and reports SUCCESS,
# satisfying branch protection's required-check list while not burning CI
# minutes on .md edits.
#
# History: paths-ignore at the workflow level made required-check jobs
# never report, deadlocking docs-only PRs (#236/#278). The current
# `detect-changes` setup avoids that trap because:
#   1. Every required-check job continues to RUN (no job-level `if: false`).
#   2. The first step in each heavy job inspects `needs.detect-changes`
#      output and either short-circuits with a SUCCESS message (docs-only)
#      or proceeds with real work (code change).
#   3. actionlint runs unconditionally — it lints workflow YAML which is
#      always present, fast, and idempotent.
#
# Code-path detection lives in the `detect-changes` job (shell-based diff
# against `github.base_ref`) — no third-party action, transparent regex.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Merge queue: GitHub builds a temporary `gh-readonly-queue/main/...` branch
  # combining PRs + main, and runs CI on that combined state. Without this
  # trigger, the queue would hang waiting for required-checks to report.
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

# 同一 ref 連續推送時，取消還在跑的舊 run，省額度。
# main 分支不取消（保留完整 history）。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  # Swatinem 建議：CI 關掉 incremental compile，cold cache 更快、target/ cache 更小。
  CARGO_INCREMENTAL: 0
  # 縮短 panic 處理時間 + 不展開 macro 反向追蹤，build 略快。
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  # ==================== Detect code changes ====================
  # Outputs `code: true|false` based on whether any code-relevant path
  # changed in this PR. Heavy downstream jobs gate their real work on this
  # output but still RUN as jobs (SUCCESS on docs-only, full work on code).
  #
  # On push-to-main events `code` is unconditionally true (merge commits
  # always get full validation regardless of detected paths).
  detect-changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need history to diff PR head against base ref.
          fetch-depth: 0
          persist-credentials: false

      # Diagnostic only fires on checkout failure; re-fails the job at end
      # so the green/red signal stays accurate. See action.yml for context.
      - name: Diagnose checkout failure
        if: steps.checkout.conclusion == 'failure'
        uses: ./.github/actions/diagnose-checkout-failure

      - name: Classify changed paths
        id: filter
        shell: bash
        env:
          BASE_REF: ${{ github.base_ref }}
          # PR event payload exposes the merge-base-equivalent SHA for free.
          # Using it avoids the post-checkout `git fetch origin <ref>` that
          # intermittently 401s on this runner image — the fetch path was
          # the only thing requiring git credentials in this job, and dropping
          # it eliminates an entire class of "could not read Username" flake.
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          EVENT_NAME: ${{ github.event_name }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail

          case "$EVENT_NAME" in
            pull_request)
              # base.sha (PR's branch-point on the base ref) is always an
              # ancestor of HEAD when checkout uses fetch-depth: 0, so it's
              # already in our local object DB — no network fetch needed.
              # Three-dot diff range gives merge-base...HEAD semantics
              # which is what we want for "files this PR changes".
              diff_range="$BASE_SHA...HEAD"
              ;;
            push)
              # $BEFORE_SHA is the previous HEAD on this ref; 0..0 means
              # branch creation / force-push with no common ancestor — be
              # conservative and treat as code change.
              if [[ -z "$BEFORE_SHA" || "$BEFORE_SHA" =~ ^0+$ ]]; then
                echo "No before SHA — defaulting code=true"
                echo "code=true" >> "$GITHUB_OUTPUT"
                exit 0
              fi
              diff_range="$BEFORE_SHA...HEAD"
              ;;
            *)
              # merge_group / workflow_dispatch / anything else: don't try
              # to classify (merge_group's combined diff base is fiddly;
              # workflow_dispatch is an explicit "run everything" signal).
              echo "Event '$EVENT_NAME' — defaulting code=true"
              echo "code=true" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          CHANGED=$(git diff --name-only "$diff_range")
          echo "Changed files (range: $diff_range):"
          while IFS= read -r file; do echo "  $file"; done <<< "$CHANGED"

          # Positive list — anything outside it is docs/config/license-only.
          # Match anchors: ^ start, $ end for exact-filename matches.
          if echo "$CHANGED" | grep -qE '^(crates/|Cargo\.toml$|Cargo\.lock$|\.github/|scripts/|rust-toolchain|deny\.toml$|clippy\.toml$|rustfmt\.toml$)'; then
            echo "Code-relevant change detected — code=true"
            echo "code=true" >> "$GITHUB_OUTPUT"
          else
            echo "No code-relevant change — code=false (docs-only)"
            echo "code=false" >> "$GITHUB_OUTPUT"
          fi

  # ==================== Code Quality ====================
  code-quality:
    name: Code Quality (Linting & Formatting)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Short-circuit for docs-only PR
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "✓ Docs-only PR — skipping rustfmt + clippy"

      - name: Harden the runner (Audit all outbound calls)
        if: needs.detect-changes.outputs.code == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        if: needs.detect-changes.outputs.code == 'true'
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Diagnose checkout failure
        if: needs.detect-changes.outputs.code == 'true' && steps.checkout.conclusion == 'failure'
        uses: ./.github/actions/diagnose-checkout-failure

      - name: Install Rust toolchain
        if: needs.detect-changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        if: needs.detect-changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: linux-build   # 與 test-ubuntu 共用 target/，避免互相覆蓋
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Run rustfmt check
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::Rustfmt"
          cargo fmt --all -- --check
          echo "::endgroup::"

      - name: Run clippy
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::Clippy"
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          echo "::endgroup::"

  # ==================== Cross-Platform Tests (nextest) ====================
  # One nextest job per platform (no sharding). Sharding (PR #362) was
  # reverted because 9–12 concurrent jobs per push push the free-tier
  # GHA concurrency window into rate-limit territory when multiple PR
  # workflows run in parallel. With this matrix, push:main fires 3 test
  # jobs; PR fires 0 (entire job gated below).
  #
  # Aggregated status is exposed via the `test-result` job below as a
  # single required check ("Test (all platforms)") — branch protection
  # cares about that one name, not the individual OS contexts.
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: detect-changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # Test fires unconditionally on every PR + push + merge_group. Author
    # opt-in via `ci:run` label was removed once Mergify queue_conditions
    # took over the merge gate — the label dance conflicted with auto-
    # routing (queue needs Test green; label toggle to fire Test caused
    # cancellation races) and was redundant with `detect-changes` already
    # skipping the test job for docs-only changes.
    if: |
      !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]'))
    env:
      # 14 tree-sitter parsers × 30+ test binaries × debug-info defaulted to
      # `true` produced ~30 GB in target/debug/deps/ and filled the ubuntu
      # runner's 14 GB free space at link time (tantivy.rlib → os error 28).
      # Tests run under nextest don't need debug-info; assertions stay on.
      CARGO_PROFILE_TEST_DEBUG: "0"

    steps:
      - name: Short-circuit for docs-only PR
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "✓ Docs-only PR — skipping cargo nextest on ${{ matrix.os }}"

      - name: Harden the runner (Audit all outbound calls)
        if: needs.detect-changes.outputs.code == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      # Reclaim ~30 GB on ubuntu runners before checkout / build. macOS &
      # windows have 50+ GB free by default; only ubuntu needs this.
      - name: Free disk space (ubuntu only)
        if: matrix.os == 'ubuntu-latest'
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be # v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          swap-storage: false

      - name: Checkout code
        if: needs.detect-changes.outputs.code == 'true'
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Diagnose checkout failure
        if: needs.detect-changes.outputs.code == 'true' && steps.checkout.conclusion == 'failure'
        uses: ./.github/actions/diagnose-checkout-failure

      - name: Install Rust toolchain
        if: needs.detect-changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-nextest
        if: needs.detect-changes.outputs.code == 'true'
        uses: taiki-e/install-action@8f531eaecd1898bc3da7d104ad91bee98d1b97bd # v2.79.9
        with:
          tool: cargo-nextest

      # Sample repos are 13 shallow clones (~1.8 GB) used as parity fixtures.
      # Key tracks the bootstrap script; cache shared across OSes since content
      # is pure git data. Hit lets the script's `.git`-presence check no-op.
      - name: Cache sample repos
        if: needs.detect-changes.outputs.code == 'true'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .sample_repo
          key: sample-repos-${{ hashFiles('scripts/parity/bootstrap_sample_repos.sh') }}

      - name: Bootstrap sample repos
        if: needs.detect-changes.outputs.code == 'true'
        shell: bash
        run: bash scripts/parity/bootstrap_sample_repos.sh

      - name: Cache cargo
        if: needs.detect-changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # ubuntu 與 code-quality 共用 cache，macos/windows 獨立
          shared-key: ${{ matrix.os == 'ubuntu-latest' && 'linux-build' || matrix.os }}
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Run tests (nextest)
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::cargo nextest"
          cargo nextest run --workspace --all-features --no-fail-fast
          echo "::endgroup::"

  # ==================== Test aggregator (required-check facade) ====================
  # Collapses the matrix `test` jobs into a single named check. Branch
  # protection requires this one name instead of listing every per-OS
  # context — keeps required-checks list stable across matrix changes.
  #
  # `if: always()` ensures this job runs even when shards fail (otherwise
  # it would go "queued forever" and time out the merge).
  #
  # Skip-handling rules:
  #   - `success` → pass (real green)
  #   - `skipped` → pass (only possible via [skip ci] in title/message; legit
  #     opt-out, gate is title-prefix not label)
  #   - anything else (failure / cancelled) → FAIL
  test-result:
    name: Test (all platforms)
    runs-on: ubuntu-latest
    needs: test
    if: ${{ always() && !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}
    steps:
      - name: Aggregate shard results
        env:
          TEST_RESULT: ${{ needs.test.result }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          echo "test job aggregate result: $TEST_RESULT (event: $EVENT_NAME)"
          if [ "$TEST_RESULT" = "success" ]; then
            exit 0
          fi
          if [ "$TEST_RESULT" = "skipped" ]; then
            echo "✓ Skipped — [skip ci] in commit/title"
            exit 0
          fi
          echo "::error::At least one test shard failed or was cancelled"
          exit 1

  # ==================== Supply-chain Audit ====================
  audit:
    name: Supply-chain (audit & deny)
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Short-circuit for docs-only PR
        if: needs.detect-changes.outputs.code != 'true'
        run: echo "✓ Docs-only PR — skipping cargo-audit + cargo-deny (no Cargo.lock change)"

      - name: Harden the runner (Audit all outbound calls)
        if: needs.detect-changes.outputs.code == 'true'
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        if: needs.detect-changes.outputs.code == 'true'
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Diagnose checkout failure
        if: needs.detect-changes.outputs.code == 'true' && steps.checkout.conclusion == 'failure'
        uses: ./.github/actions/diagnose-checkout-failure

      - name: Install Rust toolchain (audit 需要 cargo metadata 來解 Cargo.lock)
        if: needs.detect-changes.outputs.code == 'true'
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry & advisory-db
        if: needs.detect-changes.outputs.code == 'true'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Swatinem v2.9 already folds Cargo.lock hash into the final key
          # suffix (-<lockfile-hash>); wrapping the shared-key in hashFiles()
          # too forces a 100% miss on every lockfile change. Plain `audit`
          # lets the built-in lockfile-derived suffix handle invalidation.
          shared-key: audit
          # audit/deny 只讀 lockfile，不需快取 target/
          cache-targets: false
          cache-on-failure: true

      - name: Install cargo-audit & cargo-deny
        if: needs.detect-changes.outputs.code == 'true'
        uses: taiki-e/install-action@8f531eaecd1898bc3da7d104ad91bee98d1b97bd # v2.79.9
        with:
          tool: cargo-audit,cargo-deny

      - name: Run cargo-audit
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::cargo audit"
          cargo audit
          echo "::endgroup::"

      - name: Run cargo-deny
        if: needs.detect-changes.outputs.code == 'true'
        run: |
          echo "::group::cargo deny"
          cargo deny check
          echo "::endgroup::"

  # ==================== Workflow Lint ====================
  # actionlint runs unconditionally — fast (~30s), idempotent, and lints
  # the workflow YAML itself which is always present. No short-circuit.
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    # Workflow-level perms (contents: read) aren't enough — reviewdog defaults
    # to the `github-pr-check` reporter, which POSTs to /repos/.../check-runs
    # and needs `checks: write`. Without these overrides the step 401s
    # whenever actionlint actually finds an issue to report; passes silently
    # when there's nothing to publish, hiding the bug for ages.
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        id: checkout
        continue-on-error: true
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Diagnose checkout failure
        if: steps.checkout.conclusion == 'failure'
        uses: ./.github/actions/diagnose-checkout-failure

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error

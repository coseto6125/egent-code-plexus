name: CI

# CI runs on every push + PR — no path-filter skip.
#
# Earlier versions used `paths-ignore` to skip CI on docs-only / license /
# config edits. That collided with branch protection: the required-status-
# check list (Code Quality, Test on {ubuntu,macos,windows}-latest, Supply-
# chain, Lint GitHub Actions workflows) names the jobs in THIS workflow,
# so skipping the workflow meant those required checks never reported
# success and docs-only PRs got stuck `BLOCKED` with no merge path except
# admin override (see #236, #278). Removing `paths-ignore` is the simpler
# fix; CI cost on docs-only PRs is bounded by the cargo build cache —
# only the first PR after a Cargo.lock change pays the full price.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# 同一 ref 連續推送時，取消還在跑的舊 run，省額度。
# main 分支不取消（保留完整 history）。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  # Swatinem 建議：CI 關掉 incremental compile，cold cache 更快、target/ cache 更小。
  CARGO_INCREMENTAL: 0
  # 縮短 panic 處理時間 + 不展開 macro 反向追蹤，build 略快。
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  # ==================== Code Quality ====================
  code-quality:
    name: Code Quality (Linting & Formatting)
    runs-on: ubuntu-latest
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: linux-build   # 與 test-ubuntu 共用 target/，避免互相覆蓋
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Run rustfmt check
        run: |
          echo "::group::Rustfmt"
          cargo fmt --all -- --check
          echo "::endgroup::"

      - name: Run clippy
        run: |
          echo "::group::Clippy"
          cargo clippy --workspace --all-targets --all-features -- -D warnings
          echo "::endgroup::"

  # ==================== Cross-Platform Tests (nextest) ====================
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-nextest

      # Sample repos are 13 shallow clones (~1.8 GB) used as parity fixtures.
      # Key tracks the bootstrap script; cache shared across OSes since content
      # is pure git data. Hit lets the script's `.git`-presence check no-op.
      - name: Cache sample repos
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .sample_repo
          key: sample-repos-${{ hashFiles('scripts/parity/bootstrap_sample_repos.sh') }}

      - name: Bootstrap sample repos
        shell: bash
        run: bash scripts/parity/bootstrap_sample_repos.sh

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # ubuntu 與 code-quality 共用 cache，macos/windows 獨立
          shared-key: ${{ matrix.os == 'ubuntu-latest' && 'linux-build' || matrix.os }}
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Run tests (nextest)
        run: |
          echo "::group::cargo nextest"
          cargo nextest run --workspace --all-features --no-fail-fast
          echo "::endgroup::"

  # ==================== Supply-chain Audit ====================
  audit:
    name: Supply-chain (audit & deny)
    runs-on: ubuntu-latest
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain (audit 需要 cargo metadata 來解 Cargo.lock)
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Cache cargo registry & advisory-db
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          # Swatinem v2.9 already folds Cargo.lock hash into the final key
          # suffix (-<lockfile-hash>); wrapping the shared-key in hashFiles()
          # too forces a 100% miss on every lockfile change. Plain `audit`
          # lets the built-in lockfile-derived suffix handle invalidation.
          shared-key: audit
          # audit/deny 只讀 lockfile，不需快取 target/
          cache-targets: false
          cache-on-failure: true

      - name: Install cargo-audit & cargo-deny
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-audit,cargo-deny

      - name: Run cargo-audit
        run: |
          echo "::group::cargo audit"
          cargo audit
          echo "::endgroup::"

      - name: Run cargo-deny
        run: |
          echo "::group::cargo deny"
          cargo deny check
          echo "::endgroup::"

  # ==================== Workflow Lint ====================
  actionlint:
    name: Lint GitHub Actions workflows
    runs-on: ubuntu-latest
    if: ${{ !(contains(github.event.pull_request.title, '[skip ci]') || contains(github.event.head_commit.message, '[skip ci]')) }}

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run actionlint
        uses: reviewdog/action-actionlint@6fb7acc99f4a1008869fa8a0f09cfca740837d9d # v1.72.0
        with:
          fail_level: error

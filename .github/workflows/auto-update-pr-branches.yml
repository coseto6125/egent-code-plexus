name: Auto-update PR branches
# Whenever main moves, rebase every eligible open PR's branch onto the
# new main tip via GitHub's GraphQL updatePullRequestBranch mutation
# with updateMethod=REBASE. Refreshed branches re-trigger CI; once CI is
# green and auto-merge is enabled (see auto-merge.yml), GitHub merges
# without manual clicks.
#
# Why GraphQL not REST: the REST `update-branch` endpoint (PUT
# /repos/{}/pulls/{}/update-branch) is merge-only — it merges main HEAD
# INTO the PR branch as a merge commit, polluting the PR's history with
# a merge bubble per main movement. GraphQL's updatePullRequestBranch
# mutation accepts updateMethod: REBASE which replays PR commits on top
# of the new base, keeping linear history.
#
# Eligibility: non-draft, targeting main, has auto-merge already armed
# (`.autoMergeRequest != null` from `gh pr list`). Drafts and explicitly
# un-armed PRs are skipped on purpose — author hasn't opted in.
#
# Conflict handling: if rebase would conflict, the GraphQL mutation
# returns an error. The PR gets a one-time marker comment
# (`<!-- auto-update-conflict -->`) and the workflow exits non-zero so
# GitHub emails the author its usual CI-failure notification.
on:
  push:
    branches: [main]
  schedule:
    - cron: '*/15 * * * *'   # safety net for missed push events / token blips

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: auto-update-branches
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Update eligible PR branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          TRIGGER_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # `.id` is the GraphQL node ID (base64 string), required by the
          # updatePullRequestBranch mutation; .number alone isn't usable.
          prs=$(gh pr list --repo "$REPO" --state open --base main \
            --json number,id,isDraft,autoMergeRequest,headRefName \
            --jq '.[] | select(.isDraft == false and .autoMergeRequest != null) | "\(.number)\t\(.id)\t\(.headRefName)"')

          if [ -z "$prs" ]; then
            echo "no eligible PRs to update"
            exit 0
          fi

          conflicts=()
          while IFS=$'\t' read -r pr nodeid branch; do
            # shellcheck disable=SC2016
            # $id inside the query string is a GraphQL variable, not a
            # shell expansion — single quotes are correct, not an oversight.
            response=$(gh api graphql \
              -f query='
                mutation($id: ID!) {
                  updatePullRequestBranch(input: { pullRequestId: $id, updateMethod: REBASE }) {
                    pullRequest { number headRefOid }
                  }
                }
              ' \
              -f id="$nodeid" 2>&1 || true)
            case "$response" in
              *headRefOid*)
                # Mutation returned a new head SHA — rebase succeeded
                echo "✓ rebased #$pr ($branch)"
                ;;
              *"up to date"*|*"upstream branch is equal"*)
                # GraphQL returns a specific error string when nothing to do
                echo "= #$pr ($branch) already current"
                ;;
              *conflict*|*"could not be rebased"*)
                echo "✗ #$pr ($branch) conflict — author needed"
                conflicts+=("$pr")
                # Post a one-time marker comment so author gets a GitHub
                # notification. Marker survives across re-runs so we don't
                # spam on every push to main.
                marker="<!-- auto-update-conflict -->"
                existing=$(gh pr view "$pr" --repo "$REPO" --json comments \
                  --jq ".comments[] | select(.body | startswith(\"$marker\")) | .id" | head -1)
                if [ -z "$existing" ]; then
                  # printf keeps the multi-line body inside one bash var so
                  # YAML's block-scalar indentation rules stay happy. The
                  # backticks in the format string are intentional Markdown
                  # code formatting — shellcheck SC2016 is a false positive
                  # because printf treats them as literal characters.
                  # shellcheck disable=SC2016
                  body=$(printf '%s\n\n🚨 **Auto-rebase failed** — conflict with `main` (trigger commit `%s`). Please rebase manually. This comment posts only once per conflict; delete it to let the bot re-notify on the next event.' "$marker" "$TRIGGER_SHA")
                  gh pr comment "$pr" --repo "$REPO" --body "$body" || true
                fi
                ;;
              *)
                echo "✗ #$pr ($branch) unexpected response: $response"
                conflicts+=("$pr")
                ;;
            esac
          done <<< "$prs"

          if [ "${#conflicts[@]}" -gt 0 ]; then
            echo "::error::PRs needing manual intervention: ${conflicts[*]}"
            exit 1
          fi

name: CI (Windows nightly)

# Windows tests on schedule + main pushes only — NOT per-PR.
#
# Rationale: the windows-latest runner has a known
# partner-runner-images bash startup race (#169) flaking ~5% of PR runs,
# and the Rust CLI code here is platform-agnostic (uses `dirs` /
# `PathBuf` everywhere, no `cfg(windows)` divergence). Per-PR Windows
# CI was net-cost (false-positive failures + 33% wall-time tax) vs
# net-benefit (Windows-only bugs caught at PR-time).
#
# Detection window: any Windows-only regression surfaces within 24h
# (next nightly run) instead of at PR time. On failure, the
# `notify-failure` job opens / updates an issue labelled `ci-windows-broken`.

on:
  schedule:
    - cron: '0 2 * * *'      # 02:00 UTC daily
  push:
    branches: [main]         # final validation after merge
  workflow_dispatch: {}      # manual trigger

permissions:
  contents: read
  issues: write              # for the failure-notification job

concurrency:
  group: ci-windows-nightly-${{ github.ref }}
  cancel-in-progress: false  # nightly is a final-state check, don't cancel

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUSTUP_MAX_RETRIES: 10

jobs:
  test:
    name: Test on windows-latest
    runs-on: windows-latest
    env:
      CARGO_PROFILE_TEST_DEBUG: "0"

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install cargo-nextest
        uses: taiki-e/install-action@65851e10cd6c377f11a60e600abc07cb08643468 # v2.79.3
        with:
          tool: cargo-nextest

      - name: Cache sample repos
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .sample_repo
          key: sample-repos-${{ hashFiles('scripts/parity/bootstrap_sample_repos.sh') }}

      - name: Bootstrap sample repos
        shell: bash
        run: bash scripts/parity/bootstrap_sample_repos.sh

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          shared-key: windows-nightly
          cache-on-failure: true
          cache-workspace-crates: true

      - name: Run tests (nextest)
        run: |
          echo "::group::cargo nextest"
          cargo nextest run --workspace --all-features --no-fail-fast
          echo "::endgroup::"

  notify-failure:
    name: Notify on failure
    needs: test
    if: failure() && (github.event_name == 'schedule' || github.event_name == 'push')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout (for issue template)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Open / update tracking issue
        uses: JasonEtco/create-an-issue@1b14a70e4d8dc185e5cc76d3bec9eab20257b2c5 # v2.9.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          RUN_SHA: ${{ github.sha }}
          RUN_EVENT: ${{ github.event_name }}
        with:
          filename: .github/nightly-windows-failure.md
          update_existing: true        # same title → update body, don't reopen
          search_existing: open

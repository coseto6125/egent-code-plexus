# Mergify config.
#
# Routing pattern (modern Mergify, post-2024):
# - Each queue_rule carries its own `queue_conditions` — labels, base, and
#   required-check list a PR must satisfy to auto-enter THIS queue.
# - `merge_conditions` is what gates the actual merge once embarked.
# - No `pull_request_rules` needed for routing: Mergify checks each PR
#   against every queue's `queue_conditions` and embarks it into the first
#   match. Order queue_rules from most-specific to least-specific.
#
# Why not pull_request_rules.queue?
# - That action exists for EXPLICIT enqueuing (commands, advanced filters),
#   not auto-routing. With only pull_request_rules, the Mergify Merge Queue
#   check stays at "Merge queue is ready" without ever embarking — confirmed
#   on PR #386 (manual `@Mergifyio queue` worked, auto did not).
#
# The required-check list is duplicated across queue_conditions — YAML
# anchors splice nested lists which Mergify rejects, so DRY isn't available.
# Keep the list synced with `gh api repos/.../branches/main/protection`.
#
# Where does `ecp/cross-pr-conflict` belong?
# queue_conditions, NOT merge_conditions. Mergify's speculative trial
# creates a fresh commit (PR diff + main tip) — ecp-pr-analyze.yml
# triggers on `pull_request` events only, so the trial commit has no
# cross-pr-conflict status reported against it. Anything required in
# merge_conditions would thus block the trial indefinitely → dequeue
# (PR #386 was the live repro). Keeping the check in queue_conditions
# evaluates it on the PR HEAD where the status actually exists.

queue_rules:
  - name: main-test-only
    queue_conditions:
      - base=main
      - label=merge-queue
      - label=ecp:area-test
      - check-success=Test (all platforms)
      - check-success=Code Quality (Linting & Formatting)
      - check-success=Supply-chain (audit & deny)
      - check-success=Lint GitHub Actions workflows
      - check-success=CodeQL
      - check-success=dependency-review
      - status-success=ecp/cross-pr-conflict
    merge_conditions:
      - base=main
    batch_size: 10
    batch_max_wait_time: 30s

  - name: main-parser-changes
    queue_conditions:
      - base=main
      - label=merge-queue
      - label=ecp:area-parser
      - check-success=Test (all platforms)
      - check-success=Code Quality (Linting & Formatting)
      - check-success=Supply-chain (audit & deny)
      - check-success=Lint GitHub Actions workflows
      - check-success=CodeQL
      - check-success=dependency-review
      - status-success=ecp/cross-pr-conflict
    merge_conditions:
      - base=main
    batch_size: 1

  - name: main-cli-changes
    queue_conditions:
      - base=main
      - label=merge-queue
      - label=ecp:area-cli
      - check-success=Test (all platforms)
      - check-success=Code Quality (Linting & Formatting)
      - check-success=Supply-chain (audit & deny)
      - check-success=Lint GitHub Actions workflows
      - check-success=CodeQL
      - check-success=dependency-review
      - status-success=ecp/cross-pr-conflict
    merge_conditions:
      - base=main
    batch_size: 3
    batch_max_wait_time: 2m

  - name: main-docs-only
    queue_conditions:
      - base=main
      - label=merge-queue
      - label=ecp:area-docs
      - check-success=Test (all platforms)
      - check-success=Code Quality (Linting & Formatting)
      - check-success=Supply-chain (audit & deny)
      - check-success=Lint GitHub Actions workflows
      - check-success=CodeQL
      - check-success=dependency-review
      - status-success=ecp/cross-pr-conflict
    merge_conditions:
      - base=main
    batch_size: 20
    batch_max_wait_time: 10s

  # Fallback queue — catches PRs with `merge-queue` label but no area label.
  # Must come last; queue_conditions match via negation on the area-label set.
  - name: main-default
    queue_conditions:
      - base=main
      - label=merge-queue
      - -label~=^ecp:area-
      - check-success=Test (all platforms)
      - check-success=Code Quality (Linting & Formatting)
      - check-success=Supply-chain (audit & deny)
      - check-success=Lint GitHub Actions workflows
      - check-success=CodeQL
      - check-success=dependency-review
      - status-success=ecp/cross-pr-conflict
    merge_conditions:
      - base=main
    batch_size: 2

# Priority overrides: deferred to FU-2026-05-23-037.
# Modern Mergify exposes priority via `queue_rules.priority_rules` (per-queue
# nested rule list). Adding it cleanly requires duplicating priority_rules
# across all 5 queue_rules. Implement when same-area queue actually backs up.

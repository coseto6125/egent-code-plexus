# 宣告獨立 workspace 邊界，避免被外圍 workspace 吸收。
[workspace]

[package]
name = "tree-sitter-vue"
description = "Vue SFC grammar for the tree-sitter parsing library (ikatyang/tree-sitter-vue v0.2.1)"
version = "0.2.1"
keywords = ["incremental", "parsing", "vue"]
categories = ["parsing", "text-editors"]
repository = "https://github.com/ikatyang/tree-sitter-vue"
edition = "2021"
license = "MIT"

build = "bindings/rust/build.rs"
include = [
  "bindings/rust/*",
  "src/*",
]

[lib]
path = "bindings/rust/lib.rs"

[dependencies]
tree-sitter-language = "0.1.0"

[build-dependencies]
cc = "1.0"

[dev-dependencies]
tree-sitter = "0.26"
